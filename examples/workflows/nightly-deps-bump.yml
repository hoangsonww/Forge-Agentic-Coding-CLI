name: forge-deps-nightly

on:
  schedule:
    - cron: '17 4 * * *'  # 04:17 UTC daily — avoid the hot-cron minute
  workflow_dispatch:
    inputs:
      package:
        description: 'Specific package to bump (blank = auto-pick)'
        required: false

concurrency:
  group: forge-deps-nightly
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  bump:
    name: 🌙 nightly dependency bump
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      FORGE_HOME: ${{ github.workspace }}/.forge-ci
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a  # v4.2.0
        with:
          node-version: '20'
          cache: npm

      - name: Install Forge
        run: npm i -g @hoangsonw/forge@latest

      - name: Run dependency-upgrade skill
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TARGET: ${{ inputs.package }}
        run: |
          forge run \
            --mode balanced \
            --skill dependency-upgrade \
            --non-interactive \
            --skip-permissions \
            "${TARGET:+bump $TARGET to latest}${TARGET:-pick one outdated dep and bump it to latest patch}; regression-check via npm test"

      - name: Open PR
        uses: peter-evans/create-pull-request@6cd32fd93684475c31847837f87bb135d40a2b79  # v7.0.3
        with:
          branch: forge/deps-nightly-${{ github.run_id }}
          title: 'deps: nightly bump'
          body: |
            Auto-generated by the `forge-deps-nightly` workflow.

            Review the diff and the regression test output before merging.
          labels: dependencies, automated
