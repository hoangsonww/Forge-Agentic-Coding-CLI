name: forge-audit

on:
  pull_request:
    paths:
      - 'src/**'
      - 'lib/**'
      - 'app/**'
  workflow_dispatch:

concurrency:
  group: forge-audit-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    name: 🔍 forge audit
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    env:
      FORGE_HOME: ${{ github.workspace }}/.forge-ci
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
        with:
          fetch-depth: 2

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a  # v4.2.0
        with:
          node-version: '20'

      - name: Install Forge
        run: npm i -g @hoangsonw/forge@latest

      - name: Determine changed files
        id: diff
        run: |
          echo "files=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} | tr '\n' ' ')" >> "$GITHUB_OUTPUT"

      - name: Run audit
        id: forge
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          forge run \
            --mode audit \
            --non-interactive \
            --skip-permissions \
            "Audit the following files for security and correctness issues. Output a markdown table of findings with file:line, severity, and fix recommendation. Files: ${{ steps.diff.outputs.files }}" \
            | tee forge-audit.md

      - name: Comment on PR
        if: always()
        uses: marocchino/sticky-pull-request-comment@331f8f5b4215f0445d3c07b4967662a32a2d3e31  # v2.9.0
        with:
          header: forge-audit
          path: forge-audit.md
